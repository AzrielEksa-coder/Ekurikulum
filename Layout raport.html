<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Peminjaman Raport v2</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #e3f2fd;
            min-height: 100vh;
            padding: 40px 0;
        }

        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        .card-header {
            background-color: #0d6efd;
            color: white;
            border-radius: 15px 15px 0 0 !important;
            font-weight: 600;
            text-align: center;
            padding: 15px;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
        }

        .badge {
            padding: 8px 12px;
            font-weight: 500;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* Gaya untuk tombol hapus yang terkunci */
        .btn-lock {
            background-color: #e0e0e0;
            color: #9e9e9e;
            border: none;
            cursor: not-allowed;
        }

        tr { transition: all 0.3s ease; }
    </style>
</head>
<body>

<div class="container">
    <div class="container nav-back">
        
        <a href="Menu utama.html" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left me-2" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
            </svg>
            Kembali ke Beranda
        </a>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header">
                    <h4 class="mb-0">Form Peminjaman Raport</h4>
                </div>
                <div class="card-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nama Lengkap</label>
                        <input type="text" id="namaSiswa" class="form-control" placeholder="Nama siswa...">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Kelas</label>
                        <input type="text" id="kelasSiswa" class="form-control" placeholder="Contoh: XII-RPL">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Kepentingan Peminjaman</label>
                        <textarea id="kepentingan" class="form-control" rows="2" placeholder="Contoh: Untuk daftar kuliah / beasiswa"></textarea>
                    </div>
                    <button onclick="prosesPinjam()" class="btn btn-primary w-100">
                        <i class="bi bi-send me-2"></i>Konfirmasi Pinjam
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-12 mt-5">
            <div class="table-container shadow-sm">
                <h5 class="mb-4">
                    <span class="badge bg-primary me-2">History</span> Daftar Peminjaman Aktif
                </h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Tanggal</th>
                                <th>Nama Siswa</th>
                                <th>Kepentingan</th>
                                <th>Status</th>
                                <th class="text-center">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="tabelHistory">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    let dbPeminjaman = JSON.parse(localStorage.getItem('riwayat_raport_v2')) || [];

    function renderTabel() {
        const tbody = document.getElementById('tabelHistory');
        tbody.innerHTML = '';

        if (dbPeminjaman.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted">Belum ada riwayat peminjaman.</td></tr>`;
            return;
        }

        dbPeminjaman.forEach((item, index) => {
            const isKembali = item.status === 'Telah Dikembalikan';
            
            const statusBadge = isKembali 
                ? `<span class="badge bg-success">Telah Dikembalikan</span>` 
                : `<span class="badge bg-warning text-dark">Dipinjam</span>`;

            const tombolKembali = !isKembali 
                ? `<button class="btn btn-sm btn-outline-success me-2" onclick="kembalikanStatus(${index})">Kembalikan</button>` 
                : '';

            // LOGIKA HAPUS: Jika belum kembali, tombol hapus jadi abu-abu dan memicu peringatan
            const tombolHapus = isKembali 
                ? `<button class="btn btn-sm btn-danger" onclick="hapusData(${index})"><i class="bi bi-trash"></i></button>`
                : `<button class="btn btn-sm btn-lock" onclick="peringatanHapus()"><i class="bi bi-trash"></i></button>`;

            tbody.innerHTML += `
                <tr>
                    <td><small class="text-muted">${item.tanggal}</small></td>
                    <td><strong>${item.nama}</strong><br><small class="text-primary">${item.kelas}</small></td>
                    <td><small>${item.kepentingan}</small></td>
                    <td>${statusBadge}</td>
                    <td class="text-center">
                        ${tombolKembali}
                        ${tombolHapus}
                    </td>
                </tr>
            `;
        });
    }

    function prosesPinjam() {
        const nama = document.getElementById('namaSiswa').value;
        const kelas = document.getElementById('kelasSiswa').value;
        const kepentingan = document.getElementById('kepentingan').value;
        const tgl = new Date().toLocaleDateString('id-ID', { day:'2-digit', month:'short' });

        if (!nama || !kelas || !kepentingan) {
            Swal.fire('Opps!', 'Semua kolom wajib diisi!', 'warning');
            return;
        }

        dbPeminjaman.unshift({
            nama: nama,
            kelas: kelas,
            kepentingan: kepentingan,
            tanggal: tgl,
            status: 'Dipinjam'
        });

        localStorage.setItem('riwayat_raport_v2', JSON.stringify(dbPeminjaman));
        
        // Reset Form
        document.getElementById('namaSiswa').value = '';
        document.getElementById('kelasSiswa').value = '';
        document.getElementById('kepentingan').value = '';
        
        renderTabel();
        Swal.fire('Berhasil!', 'Data peminjaman telah masuk list.', 'success');
    }

    function kembalikanStatus(index) {
        dbPeminjaman[index].status = 'Telah Dikembalikan';
        localStorage.setItem('riwayat_raport_v2', JSON.stringify(dbPeminjaman));
        renderTabel();
        Swal.fire('Sukses', 'Raport ditandai telah kembali.', 'success');
    }

    function hapusData(index) {
        Swal.fire({
            title: 'Hapus Riwayat?',
            text: "Data ini akan dihapus permanen.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ya, Hapus'
        }).then((result) => {
            if (result.isConfirmed) {
                dbPeminjaman.splice(index, 1);
                localStorage.setItem('riwayat_raport_v2', JSON.stringify(dbPeminjaman));
                renderTabel();
            }
        });
    }

    // Fungsi jika tombol hapus diklik saat raport belum kembali
    function peringatanHapus() {
        Swal.fire({
            title: 'Gagal Hapus!',
            text: 'Riwayat hanya bisa dihapus jika raport sudah dikembalikan.',
            icon: 'error'
        });
    }

    renderTabel();
</script>

</body>
</html>
