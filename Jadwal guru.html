<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistem Jadwal Pelajaran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --primary: #0427e9; --bg: #0fa1f5; }
        body { background-color: var(--bg); padding-bottom: 50px; }
        .card { border: none; border-radius: 15px; overflow: hidden; cursor: pointer; }
        .card img { height: 200px; object-fit: cover; }
        #adminPanel { background: white; border-radius: 15px; display: none; }
        .delete-btn { position: absolute; top: 10px; right: 10px; z-index: 10; }
        #viewerModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 2000; }
        #viewerModal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>
<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm mb-4">
        <div class="container">
            <div class="container nav-back">
        
        <a href="Menu utama.html" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left me-2" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
            </svg>
            Kembali ke Beranda
        </a>
    </div>
            <span class="navbar-brand fw-bold" style="color: var(--primary)">Jadwal <span class="text-dark">Pelajaran</span></span>
            <div class="ms-auto">
                <button class="btn btn-danger btn-sm" id="loginBtn" onclick="openModal()">Login admin</button>
                <button class="btn btn-secondary btn-sm" id="logoutBtn" style="display:none" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="adminPanel" class="p-4 mb-4 shadow">
            <h5 class="fw-bold text-primary">Input Jadwal Pelajaran</h5>
            <div class="row g-3">
                <div class="col-md-5"><input type="text" id="namaInput" class="form-control" placeholder="Nama Mata Pelajaran" /></div>
                <div class="col-md-5"><input type="file" id="fotoInput" class="form-control" accept="image/*" /></div>
                <div class="col-md-2"><button class="btn btn-primary w-100" onclick="simpanData()">Simpan</button></div>
            </div>
        </div>
        <div class="row row-cols-1 row-cols-md-3 g-4" id="displayArea"></div>
    </div>

    <div class="modal fade" id="loginModal" tabindex="-1"><div class="modal-dialog modal-sm modal-dialog-centered"><div class="modal-content"><div class="modal-body p-4">
        <input type="password" id="passAdmin" class="form-control mb-3" placeholder="Password Admin" />
        <button class="btn btn-primary w-100" onclick="login()">Login</button>
    </div></div></div></div>

    <div id="viewerModal" onclick="this.style.display='none'"><img id="fullImg" src="" /></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // KEY BERBEDA - Agar tidak bertabrakan dengan data guru
        const KEY = "STORAGE_JADWAL_PELAJARAN_MURID_V1";
        
        let isAdmin = false;
        const modal = new bootstrap.Modal(document.getElementById('loginModal'));

        function openModal() { modal.show(); }
        function login() {
            if(document.getElementById('passAdmin').value === "guruoke") {
                isAdmin = true; document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'block';
                modal.hide(); render();
            } else { alert("Password Salah!"); }
        }
        function logout() { isAdmin = false; location.reload(); }

        async function simpanData() {
            const nama = document.getElementById('namaInput').value;
            const file = document.getElementById('fotoInput').files[0];
            if(!nama || !file) return alert("Lengkapi!");
            
            const base64 = await compress(file);
            let data = JSON.parse(localStorage.getItem(KEY)) || [];
            
            data.push({ id: Date.now(), nama, gambar: base64 });
            localStorage.setItem(KEY, JSON.stringify(data));
            render();
            document.getElementById('namaInput').value = "";
            document.getElementById('fotoInput').value = "";
        }

        function compress(file) {
            return new Promise(res => {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = e => {
                    const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 800; canvas.height = img.height * (800/img.width);
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        res(canvas.toDataURL('image/jpeg', 0.7));
                    }
                }
            });
        }

        function hapus(id) {
            event.stopPropagation();
            if(!confirm("Hapus jadwal ini?")) return;
            let data = JSON.parse(localStorage.getItem(KEY)) || [];
            localStorage.setItem(KEY, JSON.stringify(data.filter(i => i.id !== id)));
            render();
        }

        function render() {
            const data = JSON.parse(localStorage.getItem(KEY)) || [];
            const area = document.getElementById('displayArea');
            area.innerHTML = data.length ? "" : "<p class='text-white text-center w-100'>Jadwal Kosong</p>";
            data.forEach(i => {
                area.innerHTML += `
                <div class="col"><div class="card shadow-sm" onclick="document.getElementById('fullImg').src='${i.gambar}';document.getElementById('viewerModal').style.display='flex'">
                    ${isAdmin ? `<button class="btn btn-danger btn-sm delete-btn" onclick="hapus(${i.id})">Hapus</button>` : ''}
                    <img src="${i.gambar}" class="card-img-top">
                    <div class="card-body text-center bg-white"><h6 class="fw-bold mb-0">${i.nama}</h6></div>
                </div></div>`;
            });
        }
        render();
    </script>
</body>
</html>
